<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cato by Cato — CMS</title>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    function makePreview(lang) {
      return createClass({
        sendData: function() {
          var iframe = document.getElementById('cms-preview-iframe-' + lang);
          if (iframe && iframe.contentWindow && this.props.entry) {
            iframe.contentWindow.postMessage(
              { type: 'cms-preview', lang: lang, data: this.props.entry.get('data').toJS() },
              '*'
            );
          }
        },

        componentDidUpdate: function() {
          this.sendData();
        },

        render: function() {
          var self = this;
          return h('iframe', {
            id: 'cms-preview-iframe-' + lang,
            src: '/',
            onLoad: function() { self.sendData(); },
            style: { width: '100%', height: '100vh', border: 'none' }
          });
        }
      });
    }

    CMS.registerPreviewTemplate('nl', makePreview('nl'));
    CMS.registerPreviewTemplate('en', makePreview('en'));
  </script>
</body>
</html>
